services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: kursova_2
      MYSQL_ROOT_PASSWORD: "1234"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db_init:/docker-entrypoint-initdb.d:ro

  web:
    build: .
    restart: always
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_PASSWORD: "1234"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

volumes:
  mysql_data: